name: pipeline

on:
  pull_request:
  push:
    branches:
      - develop
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v6
        with:
          name: coverage
          path: coverage

  quality-gate:
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download coverage artifact
        uses: actions/download-artifact@v7
        with:
          name: coverage
          path: coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ vars.SONAR_ORG }}
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.qualitygate.wait=true

  deploy:
    runs-on: ubuntu-latest
    needs:
      - test
      - quality-gate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: dev

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail

          AWS_ACCOUNT_ID_CLEAN="$(printf '%s' "$AWS_ACCOUNT_ID" | tr -d '\r\n')"
          AWS_REGION_CLEAN="$(printf '%s' "$AWS_REGION" | tr -d '\r\n')"
          ECR_REPOSITORY_CLEAN="$(printf '%s' "$ECR_REPOSITORY" | tr -d '\r\n')"
          IMAGE_TAG_CLEAN="$(printf '%s' "$IMAGE_TAG" | tr -d '\r\n')"

          test -n "$AWS_ACCOUNT_ID_CLEAN"
          test -n "$AWS_REGION_CLEAN"
          test -n "$ECR_REPOSITORY_CLEAN"
          test -n "$IMAGE_TAG_CLEAN"

          IMAGE_URI="$AWS_ACCOUNT_ID_CLEAN.dkr.ecr.$AWS_REGION_CLEAN.amazonaws.com/$ECR_REPOSITORY_CLEAN"

          echo "Building image: $IMAGE_URI:$IMAGE_TAG_CLEAN"
          echo "IMAGE_URI=$IMAGE_URI:$IMAGE_TAG_CLEAN" >> "$GITHUB_ENV"

          docker build \
            -t "$IMAGE_URI:$IMAGE_TAG_CLEAN" \
            -t "$IMAGE_URI:latest" \
            .

          docker push "$IMAGE_URI:$IMAGE_TAG_CLEAN"
          docker push "$IMAGE_URI:latest"

      - name: Load current ECS task definition
        env:
          ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
          ECS_SERVICE: ${{ vars.ECS_SERVICE }}
          ECS_CONTAINER_NAME: ${{ vars.ECS_CONTAINER_NAME }}
        run: |
          set -euo pipefail

          TASK_DEFINITION_ARN="$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --query 'services[0].taskDefinition' \
            --output text)"

          aws ecs describe-task-definition \
            --task-definition "$TASK_DEFINITION_ARN" \
            --query 'taskDefinition' \
            > task-definition.json

          CONTAINER_NAME_RESOLVED="$(printf '%s' "${ECS_CONTAINER_NAME:-}" | tr -d '\r\n')"

          if [ -z "$CONTAINER_NAME_RESOLVED" ]; then
            CONTAINER_NAME_RESOLVED="$(jq -r '.containerDefinitions[0].name' task-definition.json)"
          fi

          echo "ECS_CONTAINER_NAME_RESOLVED=$CONTAINER_NAME_RESOLVED" >> "$GITHUB_ENV"

      - name: Render new ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.ECS_CONTAINER_NAME_RESOLVED }}
          image: ${{ env.IMAGE_URI }}

      - name: Deploy updated ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          cluster: ${{ vars.ECS_CLUSTER }}
          service: ${{ vars.ECS_SERVICE }}
          wait-for-service-stability: true
